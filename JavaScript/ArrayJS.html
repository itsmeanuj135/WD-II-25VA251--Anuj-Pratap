<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array in JS</title>
</head>
<body>
    <script>
  let num=[4,5,6,7,8,8,9,9,67,4,4,3,232,];

  console.log(num.length);

  console.log(num.pop());  //end

  console.log(num.push(24)); //end

  console.log(num.unshift()); // remove element from beginning

  console.log(num.shift(45)); // add in beginning
    </script>
</body>
</html>
