<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom in JS</title>
</head>

<body>
    <!-- The Document Object Model (DOM) is a programming interface that treats an HTML, SVG, or XML document as a tree structure of objects. This allows JavaScript to access and manipulate the content, structure, and style of a web page dynamically. -->
    <h2>Check your age to cast the Vote!</h2>
    <form action="">
        <input type="number" placeholder="Enter your age!" name="age" id="age" />
        <input type="submit" value="submit" onclick="result()" />
    </form>
    <script>
        function result() {
            let myAge = document.getElementById('age').value;
            if (myAge >= 18) {
                alert("Eligible");
            }
            else {
                alert("Not Eligible");
            }
        }


    </script>

</body>
</html>
